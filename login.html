<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Куторгин Руслан Алексеевич</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="row">
        <div class="col-12 text-center">
            <h1 class="mb-4">Вход в аккаунт</h1>
            <form action="/login.html" method="POST" class="d-flex flex-column gap-3">
                <input type="text" name="login" class="form-control" placeholder="логин">
                <input type="password" name="password" class="form-control" placeholder="пароль">
                <button class="btn btn-primary" type="submit" name="submit">Войти!</button>
                <p class="mt-3">Пока что нет аккаунта? <a href="/registration.html">Зарегистрируйтесь!</a></p>
            </form>
        </div>
    </div>
</div>
</body>
</html>
